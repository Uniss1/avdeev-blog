<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base | Tech Blog</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;700&family=Unbounded:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Unbounded', 'sans-serif'],
                        sans: ['Geist', 'sans-serif'],
                        mono: ['"Geist Mono"', 'monospace'],
                    },
                    borderWidth: {
                        '3': '3px',
                    }
                }
            }
        }
    </script>

    <style>
        /* --- STROGA CRNO-BELA MREŽA SA TAČKAMA --- */
        body {
            background-color: #ffffff;
            /* Чистая, контрастная точечная сетка, как на принте */
            background-image: radial-gradient(#d1d5db 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            color: #000000;
            /* Смещение сетки для идеального выравнивания по краям экрана */
            background-position: 0 0; 
        }

        /* Убираем фон у контейнеров, чтобы сетка просвечивала, 
           но добавляем белый там, где текст может сливаться (внутри карточек) */
        .bujo-box {
            border: 2px solid #000000;
            background-color: rgba(255, 255, 255, 0.95);
        }

        .bujo-header-box {
            border-bottom: 2px solid #000000;
        }

        /* Строгий скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #000000; }
        ::-webkit-scrollbar-thumb:hover { background: #333333; }

        /* Имитация линовки (линии вместо точек для заметок) */
        .lined-paper {
            background-image: repeating-linear-gradient(transparent, transparent 31px, #e5e7eb 31px, #e5e7eb 32px);
            line-height: 32px;
        }

        /* Для графиков */
        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col md:flex-row antialiased selection:bg-black selection:text-white">

    <!-- ЛЕВАЯ ПАНЕЛЬ (ИНДЕКС / САЙДБАР) -->
    <!-- Убрана тень, добавлен строгий border -->
    <aside class="w-full md:w-72 h-full border-r-2 border-black bg-white/95 flex flex-col z-20 relative">
        <div class="p-8 flex-1 overflow-y-auto">
            
            <!-- Заголовок -->
            <div class="mb-12 text-center bujo-header-box pb-6">
                <h1 class="font-display font-black uppercase text-4xl text-black mb-2 tracking-tight">Индекс</h1>
                <p class="font-mono text-[10px] tracking-[0.2em] uppercase font-bold">Техническая База Знаний</p>
            </div>

            <!-- Навигация -->
            <nav class="space-y-10">
                <div class="bujo-box">
                    <div class="bujo-header-box bg-black text-white p-2 text-center font-display font-bold uppercase text-lg tracking-wider">
                        Навигация
                    </div>
                    <ul class="p-4 space-y-3 font-mono text-sm">
                        <li>
                            <button onclick="router.navigate('home')" class="w-full text-left flex items-center justify-between group hover:font-bold">
                                <span>Обзор</span>
                                <span class="text-xs group-hover:text-black">01</span>
                            </button>
                        </li>
                        <li>
                            <button onclick="router.navigate('all-notes')" class="w-full text-left flex items-center justify-between group hover:font-bold">
                                <span>Все записи</span>
                                <span class="text-xs group-hover:text-black">02</span>
                            </button>
                        </li>
                    </ul>
                </div>

                <!-- Коллекции / Теги -->
                <div class="bujo-box">
                    <div class="bujo-header-box p-2 text-center font-display font-bold uppercase text-lg tracking-wider">
                        Темы
                    </div>
                    <div class="p-4 flex flex-col gap-2 font-mono text-sm" id="tag-cloud">
                        <!-- Заполняется через JS -->
                    </div>
                </div>

            </nav>
        </div>
        
        <!-- Подвал -->
        <div class="p-6 border-t-2 border-black font-mono text-[10px] text-center uppercase tracking-widest font-bold bg-white">
            Публичный Ресурс
        </div>
    </aside>

    <!-- ПРАВАЯ ЧАСТЬ (ОСНОВНОЙ КОНТЕНТ) -->
    <main class="flex-1 h-full relative overflow-hidden flex flex-col bg-transparent">
        <div id="app-content" class="flex-1 overflow-y-auto px-6 md:px-12 lg:px-20 pb-24 pt-12 z-0">
            <!-- Контент вставляется сюда -->
        </div>
    </main>

    <!-- JAVASCRIPT ЛОГИКА -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            router.init();
        });

        // --- БАЗА ДАННЫХ ---
        const db = {
            notes: [
                {
                    id: 1,
                    title: "Хаки для оптимизации в 1С Аналитике",
                    date: "15.05",
                    category: "BI",
                    tags: ["1C-Analytics", "SQL", "Оптимизация"],
                    type: "Техническое",
                    content: `
                        <p class="font-sans font-medium mb-6 text-lg">Контекст: Борьба с задержками при рендеринге дашбордов на больших объемах данных.</p>
                        
                        <div class="bujo-box p-6 mb-8">
                            <h3 class="font-display font-bold uppercase text-xl mb-4 border-b-2 border-black pb-2 inline-block">Решения</h3>
                            <ul class="font-sans space-y-3 mt-4">
                                <li class="flex items-start gap-3">
                                    <div class="mt-1 w-3 h-3 border-2 border-black bg-black flex-shrink-0"></div>
                                    <span>Материализованные представления обязательны для тяжелых отчетов.</span>
                                </li>
                                <li class="flex items-start gap-3">
                                    <div class="mt-1 w-3 h-3 border-2 border-black bg-black flex-shrink-0"></div>
                                    <span>Индексирование на уровне PostgreSQL (1С не всегда создает оптимальные запросы).</span>
                                </li>
                                <li class="flex items-start gap-3">
                                    <div class="mt-1 w-3 h-3 border-2 border-black flex-shrink-0"></div>
                                    <span>Ограничение исторических данных на уровне источника.</span>
                                </li>
                            </ul>
                        </div>

                        <div class="bujo-box relative">
                            <div class="bg-black text-white p-2 font-mono text-xs font-bold border-b-2 border-black">SQL_SNIPPET.sql</div>
                            <pre class="p-6 font-mono text-sm overflow-x-auto">
SELECT 
  Dimension1, 
  SUM(Measure1) as Total 
FROM DataLake.FactTable 
WHERE Period >= '2024-01-01'
GROUP BY Dimension1</pre>
                        </div>
                    `,
                    metrics: { label: "Время запроса (мс)", before: 4500, after: 320 }
                },
                {
                    id: 2,
                    title: "Локальные LLM-агенты для анализа документов",
                    date: "10.05",
                    category: "AI",
                    tags: ["AI-Агенты", "LLM", "Python"],
                    type: "Эксперимент",
                    content: `
                        <p class="font-sans font-medium mb-6 text-lg">Цель: Создать RAG-пайплайн, который не отправляет корпоративные данные во внешние API.</p>
                        
                        <div class="grid grid-cols-2 gap-6 mb-8">
                            <div class="bujo-box p-4">
                                <div class="text-center font-display font-bold uppercase text-sm md:text-base border-b-2 border-black pb-2 mb-4">Технологический стек</div>
                                <ul class="font-mono text-sm space-y-2">
                                    <li>- Ollama (Llama 3 8B)</li>
                                    <li>- LangChain</li>
                                    <li>- ChromaDB</li>
                                </ul>
                            </div>
                            <div class="bujo-box p-4">
                                <div class="text-center font-display font-bold uppercase text-sm md:text-base border-b-2 border-black pb-2 mb-4">Результат</div>
                                <p class="font-sans text-sm text-center mt-4">Скорость ~45 ток/с на M2 Max. Достаточно для комфортного чтения.</p>
                            </div>
                        </div>
                    `,
                    metrics: { label: "Токенов/Сек", value: 45 }
                },
                {
                    id: 3,
                    title: "Паттерны пайплайнов в Airflow",
                    date: "20.04",
                    category: "Инженерия",
                    tags: ["Пайплайны-данных", "ETL", "Airflow"],
                    type: "Лучшая практика",
                    content: `
                        <p class="font-sans font-medium mb-6 text-lg">Обеспечение идемпотентности в ежедневных загрузках (ETL).</p>
                        
                        <div class="bujo-box mb-8">
                            <div class="bg-black text-white p-2 text-center font-display font-bold uppercase text-lg tracking-widest">Чек-лист</div>
                            <div class="p-6">
                                <ul class="space-y-4 font-mono text-sm">
                                    <li class="flex items-center gap-3">
                                        <div class="w-4 h-4 border-2 border-black flex items-center justify-center font-bold text-xs">X</div> 
                                        Использовать logical_date вместо datetime.now()
                                    </li>
                                    <li class="flex items-center gap-3">
                                        <div class="w-4 h-4 border-2 border-black flex items-center justify-center font-bold text-xs">X</div> 
                                        Паттерн DELETE-INSERT перед загрузкой
                                    </li>
                                    <li class="flex items-center gap-3">
                                        <div class="w-4 h-4 border-2 border-black"></div> 
                                        По умолчанию Catchup=False
                                    </li>
                                </ul>
                            </div>
                        </div>
                    `,
                    metrics: null
                }
            ]
        };

        // --- РОУТЕР И РЕНДЕРЕР ---
        const router = {
            currentPage: 'home',
            init() {
                this.renderSidebarTags();
                this.navigate('home');
            },
            navigate(page, data = null) {
                this.currentPage = page;
                const contentDiv = document.getElementById('app-content');
                
                contentDiv.style.opacity = '0';
                
                setTimeout(() => {
                    if (page === 'home') this.renderHome(contentDiv);
                    else if (page === 'all-notes') this.renderList(contentDiv, null);
                    else if (page === 'tag') this.renderList(contentDiv, data);
                    else if (page === 'detail') this.renderDetail(contentDiv, data);
                    
                    lucide.createIcons();
                    contentDiv.style.transition = 'opacity 0.2s ease';
                    contentDiv.style.opacity = '1';
                }, 100);
            },

            renderSidebarTags() {
                const tags = [...new Set(db.notes.flatMap(n => n.tags))];
                const container = document.getElementById('tag-cloud');
                container.innerHTML = tags.map(tag => `
                    <button onclick="router.navigate('tag', '${tag}')" 
                        class="text-left hover:bg-black hover:text-white px-2 py-1 transition-colors border border-transparent hover:border-black">
                        #${tag}
                    </button>
                `).join('');
            },

            renderHome(container) {
                // Строгая сеточная структура
                container.innerHTML = `
                    <div class="max-w-5xl mx-auto">
                        <!-- Главный заголовок -->
                        <div class="mb-12 text-center">
                            <h2 class="font-display font-black uppercase tracking-tight text-5xl md:text-7xl text-black">Обзор</h2>
                        </div>
                        
                        <!-- Сетка блоков (CSS Grid) -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
                            
                            <!-- Левая колонка (Широкая) -->
                            <div class="md:col-span-2 space-y-6 md:space-y-8">
                                
                                <!-- Блок "Недавние записи" -->
                                <div class="bujo-box h-full">
                                    <div class="bujo-header-box p-3 text-center">
                                        <h3 class="font-display font-bold uppercase text-2xl tracking-wide">Недавние записи</h3>
                                    </div>
                                    <div class="p-6">
                                        <ul class="space-y-4 font-sans font-medium">
                                            ${db.notes.map(note => `
                                                <li onclick="router.navigate('detail', db.notes.find(n => n.id === ${note.id}))" 
                                                    class="flex items-center gap-4 cursor-pointer group">
                                                    <div class="w-3 h-3 rounded-full bg-black group-hover:scale-150 transition-transform"></div>
                                                    <span class="flex-1 group-hover:underline decoration-2 underline-offset-4">${note.title}</span>
                                                    <span class="font-mono text-sm border-b-2 border-black pb-0.5">${note.date}</span>
                                                </li>
                                            `).join('')}
                                        </ul>
                                    </div>
                                </div>
                                
                            </div>

                            <!-- Правая колонка (Узкая) -->
                            <div class="space-y-6 md:space-y-8">
                                
                                <!-- Блок статистики -->
                                <div class="bujo-box bg-white">
                                    <div class="bujo-header-box p-3 text-center bg-black text-white">
                                        <h3 class="font-display font-bold uppercase text-xl tracking-wide">Статистика</h3>
                                    </div>
                                    <div class="p-6 pb-8">
                                        <div class="chart-container">
                                            <canvas id="growthChart"></canvas>
                                        </div>
                                    </div>
                                </div>

                                <!-- Блок "Бэклог" (с линиями) -->
                                <div class="bujo-box h-64 flex flex-col">
                                    <div class="bujo-header-box p-3 text-center">
                                        <h3 class="font-display font-bold uppercase text-xl tracking-wide">Бэклог</h3>
                                    </div>
                                    <div class="flex-1 lined-paper px-6 pt-2 font-mono text-sm leading-[32px]">
                                        - Тестирование ClickHouse<br>
                                        - Обновление архитектуры DWH<br>
                                        - 
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                `;

                // График в строгом черно-белом стиле
                setTimeout(() => {
                    const ctx = document.getElementById('growthChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Янв', 'Фев', 'Мар', 'Апр'],
                            datasets: [{
                                label: 'Записи',
                                data: [5, 12, 18, 25],
                                borderColor: '#000000',
                                borderWidth: 3,
                                fill: false,
                                pointBackgroundColor: '#ffffff',
                                pointBorderColor: '#000000',
                                pointBorderWidth: 2,
                                pointRadius: 5,
                                pointHoverRadius: 7,
                                tension: 0 // Прямые, острые линии
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: {
                                    grid: { color: '#000000', drawBorder: true, lineWidth: 0.5 },
                                    ticks: { font: { family: '"Geist Mono"' }, color: '#000', stepSize: 10 }
                                },
                                x: {
                                    grid: { display: false, drawBorder: true },
                                    ticks: { font: { family: '"Geist Mono"' }, color: '#000' }
                                }
                            }
                        }
                    });
                }, 50);
            },

            renderList(container, filterTag) {
                const notes = filterTag 
                    ? db.notes.filter(n => n.tags.includes(filterTag))
                    : db.notes;
                
                const title = filterTag ? `Тема: #${filterTag}` : 'Все записи';

                container.innerHTML = `
                    <div class="max-w-4xl mx-auto pt-8">
                        <div class="mb-12 text-center">
                            <h2 class="font-display font-black uppercase text-4xl md:text-5xl text-black inline-block border-b-4 border-black pb-2 px-8">${title}</h2>
                        </div>

                        <div class="space-y-6">
                            ${notes.map(note => `
                                <article onclick="router.navigate('detail', db.notes.find(n => n.id === ${note.id}))" 
                                    class="bujo-box p-0 cursor-pointer group hover:bg-black hover:text-white transition-colors duration-200 flex flex-col md:flex-row">
                                    
                                    <!-- Блок с датой -->
                                    <div class="md:w-32 p-6 md:border-r-2 border-b-2 md:border-b-0 border-black flex flex-col justify-center items-center group-hover:border-white">
                                        <span class="font-display font-bold text-3xl">${note.date}</span>
                                        <span class="font-mono text-xs uppercase tracking-widest mt-2">2024</span>
                                    </div>
                                    
                                    <!-- Блок с контентом -->
                                    <div class="flex-1 p-6 md:px-8 flex flex-col justify-center">
                                        <h3 class="font-sans font-bold text-2xl mb-2 group-hover:underline decoration-2 underline-offset-4">
                                            ${note.title}
                                        </h3>
                                        <div class="flex gap-2 mt-2">
                                            ${note.tags.map(t => `<span class="font-mono text-xs border border-current px-2 py-0.5">${t}</span>`).join('')}
                                        </div>
                                    </div>
                                </article>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            renderDetail(container, note) {
                container.innerHTML = `
                    <div class="max-w-3xl mx-auto pt-8 pb-20">
                        <button onclick="router.navigate('home')" class="mb-8 font-mono text-sm border-2 border-black px-4 py-2 hover:bg-black hover:text-white transition-colors inline-flex items-center gap-2 font-bold">
                            <i data-lucide="arrow-left" class="w-4 h-4"></i> НАЗАД
                        </button>

                        <article class="bujo-box">
                            <header class="bujo-header-box p-8 md:p-12 bg-black text-white text-center">
                                <div class="font-mono text-sm tracking-[0.3em] uppercase mb-6 border-b border-white/30 pb-4 inline-block">
                                    Запись // ${note.date}.2024
                                </div>
                                <h1 class="font-display font-black uppercase text-3xl md:text-5xl leading-tight mb-6">
                                    ${note.title}
                                </h1>
                                <div class="flex justify-center gap-3">
                                    ${note.tags.map(t => `
                                        <span class="font-mono text-xs border border-white px-3 py-1 bg-white text-black font-bold">#${t}</span>
                                    `).join('')}
                                </div>
                            </header>

                            <div class="p-8 md:p-12 font-sans text-black">
                                ${note.content}
                            </div>
                        </article>
                    </div>
                `;
            }
        };

    </script>
</body>
</html>
